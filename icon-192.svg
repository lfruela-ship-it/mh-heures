<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="roundRect">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <!-- Background — bleu marine MH -->
  <rect width="512" height="512" rx="115" ry="115" fill="#1F3864"/>

  <!-- Accent stripe bas orange -->
  <rect x="0" y="420" width="512" height="92" rx="0" fill="#E8532B" clip-path="url(#roundRect)"/>
  <rect x="0" y="410" width="512" height="20" fill="#C44420" clip-path="url(#roundRect)"/>

  <!-- Horloge principale — cercle extérieur -->
  <circle cx="256" cy="226" r="155" fill="none" stroke="#ffffff" stroke-width="18" opacity="0.15"/>
  <circle cx="256" cy="226" r="138" fill="#ffffff" opacity="0.07"/>
  <circle cx="256" cy="226" r="138" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4"/>

  <!-- Cadran blanc -->
  <circle cx="256" cy="226" r="118" fill="#ffffff"/>

  <!-- Graduations heures (12 petites marques) -->
  <g stroke="#D6E4F0" stroke-width="3" stroke-linecap="round">
    <!-- 12h --><line x1="256" y1="118" x2="256" y2="130"/>
    <!-- 1h  --><line x1="314" y1="132" x2="308" y2="143"/>
    <!-- 2h  --><line x1="356" y1="175" x2="345" y2="181"/>
    <!-- 3h  --><line x1="374" y1="226" x2="362" y2="226"/>
    <!-- 4h  --><line x1="356" y1="277" x2="345" y2="271"/>
    <!-- 5h  --><line x1="314" y1="320" x2="308" y2="309"/>
    <!-- 6h  --><line x1="256" y1="334" x2="256" y2="322"/>
    <!-- 7h  --><line x1="198" y1="320" x2="204" y2="309"/>
    <!-- 8h  --><line x1="156" y1="277" x2="167" y2="271"/>
    <!-- 9h  --><line x1="138" y1="226" x2="150" y2="226"/>
    <!-- 10h --><line x1="156" y1="175" x2="167" y2="181"/>
    <!-- 11h --><line x1="198" y1="132" x2="204" y2="143"/>
  </g>

  <!-- Marques heures principales (3, 6, 9, 12) plus épaisses -->
  <g stroke="#2E5F9E" stroke-width="5" stroke-linecap="round">
    <line x1="256" y1="118" x2="256" y2="136"/>
    <line x1="374" y1="226" x2="356" y2="226"/>
    <line x1="256" y1="334" x2="256" y2="316"/>
    <line x1="138" y1="226" x2="156" y2="226"/>
  </g>

  <!-- Zone de progression (arc orange — représente 7h travaillées sur 8h) -->
  <!-- Arc de 7h/8h = 315° = de -90° à 225° -->
  <circle cx="256" cy="226" r="105"
    fill="none"
    stroke="#E8532B"
    stroke-width="10"
    stroke-linecap="round"
    stroke-dasharray="463 659"
    stroke-dashoffset="165"
    opacity="0.25"
    transform="rotate(-90 256 226)"/>

  <!-- Arc plein orange (heures travaillées) -->
  <circle cx="256" cy="226" r="105"
    fill="none"
    stroke="#E8532B"
    stroke-width="8"
    stroke-linecap="round"
    stroke-dasharray="405 659"
    stroke-dashoffset="165"
    transform="rotate(-90 256 226)"/>

  <!-- Aiguille des heures — pointe vers ~8h (travail du matin) -->
  <line x1="256" y1="226" x2="210" y2="188"
    stroke="#1F3864" stroke-width="10" stroke-linecap="round"/>

  <!-- Aiguille des minutes — pointe vers 12 -->
  <line x1="256" y1="226" x2="256" y2="148"
    stroke="#1F3864" stroke-width="7" stroke-linecap="round"/>

  <!-- Aiguille trotteuse — pointe vers ~20 sec -->
  <line x1="256" y1="226" x2="272" y2="316"
    stroke="#E8532B" stroke-width="3" stroke-linecap="round"/>

  <!-- Centre de l'horloge -->
  <circle cx="256" cy="226" r="10" fill="#1F3864"/>
  <circle cx="256" cy="226" r="5" fill="#E8532B"/>

  <!-- Texte "7.25h" sur l'arc orange -->
  <text x="374" y="192" font-family="Arial, sans-serif" font-size="22"
    font-weight="700" fill="#E8532B" text-anchor="middle">7.25h</text>

  <!-- Bande orange bas — texte -->
  <text x="256" y="463" font-family="Arial Black, Arial, sans-serif" font-size="28"
    font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">MH</text>
  <text x="256" y="487" font-family="Arial, sans-serif" font-size="13"
    font-weight="400" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="1">HEURES</text>
</svg>
